name: Fetch WC Data

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and process data
        env:
          FD_TOKEN: ${{ secrets.FD_TOKEN }}
        run: python3 fetch_data.py

      - name: Commit data.json to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp data.json /tmp/data.json
          git checkout -- data.json 2>/dev/null || true
          git pull --rebase
          cp /tmp/data.json data.json
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update WC data [skip ci]"
          git push

      - name: Sync data.json to Pages branch
        run: |
          git fetch origin claude/quirky-pasteur-ion73w
          git checkout claude/quirky-pasteur-ion73w
          cp /tmp/data.json data.json
          git add data.json
          git diff --staged --quiet || git commit -m "chore: sync WC data to Pages [skip ci]"
          git push origin claude/quirky-pasteur-ion73w
